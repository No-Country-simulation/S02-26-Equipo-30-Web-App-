# =========================================
# APP SETTINGS (DEV)
# =========================================
spring.application.name=horse-retail
server.port=8090
# =========================================
# DATASOURCE (LOCAL POSTGRES)
# =========================================
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# =========================================
# JPA / HIBERNATE (DEV)
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# =========================================
# LOGGING
# =========================================
logging.level.org.springframework=info
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace
# =========================================
# Security JWT
# =========================================
jwt.expiration=300000
jwt.refresh-expiration=1800000
jwt.secret_key=${SECRET_KEY}
# =========================================
# PASSWORD RESET / EMAIL
# =========================================
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@horse-trust.local}
app.reset-password.base-url=${RESET_PASSWORD_BASE_URL:http://localhost:5173/reset-password}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
